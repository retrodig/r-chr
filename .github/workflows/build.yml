name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: R-CHR
            asset_name: R-CHR-linux-x86_64
            asset_path: R-CHR-linux-x86_64
          - os: windows-latest
            artifact_name: R-CHR.exe
            asset_name: R-CHR-windows-x86_64.exe
            asset_path: R-CHR-windows-x86_64.exe
          - os: macos-latest
            artifact_name: R-CHR
            asset_name: R-CHR-macos-aarch64
            asset_path: R-CHR-macos-aarch64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Build
        run: cargo build --release

      - name: Package (Linux / Windows)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: cp target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Package (macOS .app bundle)
        if: matrix.os == 'macos-latest'
        run: |
          APP="R-CHR.app"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # ディレクトリ構造
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # バイナリ
          cp target/release/R-CHR "$APP/Contents/MacOS/R-CHR"

          # Info.plist（バージョンを埋め込む）
          sed "s/{{VERSION}}/$VERSION/g" macos/Info.plist > "$APP/Contents/Info.plist"

          # icon.png → AppIcon.icns
          ICONSET="AppIcon.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 128 256 512; do
            sips -z $size $size assets/icon.png --out "$ICONSET/icon_${size}x${size}.png"
            sips -z $((size * 2)) $((size * 2)) assets/icon.png --out "$ICONSET/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"
          rm -rf "$ICONSET"

          # ad-hoc 署名（Gatekeeper の「壊れている」エラーを回避）
          codesign --force --deep --sign - "$APP"

          # ditto で zip（パーミッション・拡張属性を保持）
          ditto -c -k --keepParent "$APP" ${{ matrix.asset_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: artifacts/*
          fail_on_unmatched_files: true
          make_latest: true